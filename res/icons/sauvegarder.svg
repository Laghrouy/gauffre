  <path d="M24 2 L30 8 L24 8 Z" fill="#6A90D2"/>
  <!-- Label lines -->
  <line x1="7"  y1="6.5"  x2="16" y2="6.5"  stroke="#8AAAE0" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="7"  y1="9.5"  x2="13" y2="9.5"  stroke="#8AAAE0" stroke-width="1.4" stroke-linecap="round"/>
